name: API 契约红线（防漂移）
# 单一事实源 docs/api/openapi-core.yaml 的 CI 门禁：
#   Gate0 契约自身：Spectral lint + oasdiff 破坏性变更检测
#   Gate1 后端符合契约：schemathesis 拿契约打后端（响应违约即失败）—— 命门
# 触发：改动契约或后端实现的 PR / push
on:
  pull_request:
    paths: ["docs/api/**", "backend/**"]
  push:
    branches: [main]
    paths: ["docs/api/**", "backend/**"]

env:
  SPEC: docs/api/openapi-core.yaml

jobs:
  contract-lint:                       # Gate0a：契约 lint（硬红线）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Spectral lint
        run: npx -y @stoplight/spectral-cli lint "$SPEC" --ruleset docs/api/.spectral.yaml --fail-severity=error

  breaking-change:                     # Gate0b：破坏性变更检测（删字段/改类型/改必填 → 标 breaking，需升版本+双 approve）
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: oasdiff (base vs head)
        run: |
          git show "origin/${{ github.base_ref }}:$SPEC" > /tmp/base.yaml 2>/dev/null || { echo "base 无契约，跳过"; exit 0; }
          docker run --rm -v /tmp:/tmp -v "$PWD:/repo" tufin/oasdiff breaking /tmp/base.yaml "/repo/$SPEC" --fail-on ERR

  contract-test:                       # Gate1：后端必须符合契约（命门）。需后端可达。
    runs-on: ubuntu-latest
    continue-on-error: true            # 【地基期】后端未起→放开，仅信息。每完成一里程碑模块，把该模块 path 纳入 gate1-strict 硬校验；全部实现后删本 job、gate1-strict 去过滤=整体硬红线。
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: schemathesis 打后端（断言响应符合契约）
        env: { TARGET: "${{ vars.API_BASE_URL || 'http://localhost:8080/v1' }}" }
        run: |
          pip install schemathesis
          # 注：契约用 OpenAPI 3.1.0；--checks all 校验状态码/响应 schema/错误结构是否符合契约
          schemathesis run "$SPEC" --base-url "$TARGET" --checks all --hypothesis-max-examples=20 || {
            echo "::error::后端响应违反契约（Gate1 命门）"; exit 1; }

  gate1-strict:                        # Gate1 硬红线·按里程碑逐模块收紧：只打"已实现模块"的 path，违约即挂。
    runs-on: ubuntu-latest               # 每完成一个里程碑，往 DONE_PATHS 加该模块 path 正则；全部完成后删过滤 + 删 contract-test/continue-on-error。
    env:
      # 已转硬红线的模块 path 正则（地基期为空=本 job 跳过；M1 完成后填 "^/auth|^/me" …）
      DONE_PATHS: ""
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: schemathesis 硬校验已完成模块
        if: ${{ env.DONE_PATHS != '' }}
        env: { TARGET: "${{ vars.API_BASE_URL || 'http://localhost:8080/v1' }}" }
        run: |
          pip install schemathesis
          schemathesis run "$SPEC" --base-url "$TARGET" --checks all \
            --include-path-regex "$DONE_PATHS" --hypothesis-max-examples=30 || {
            echo "::error::已完成模块响应违反契约（Gate1 硬红线）"; exit 1; }

  mock-smoke:                          # 辅助：Prism 起 mock，确保契约可被 mock（前端可对 mock 开发）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Prism mock 自检
        run: |
          npx -y @stoplight/prism-cli mock "$SPEC" &
          sleep 5
          curl -sf http://127.0.0.1:4010/v1/me >/dev/null && echo "mock OK" || echo "mock 起动（接口需鉴权属正常）"
