name: API 契约红线（防漂移）
# 单一事实源 docs/api/openapi-core.yaml 的 CI 门禁：
#   Gate0 契约自身：Spectral lint + oasdiff 破坏性变更检测
#   Gate1 后端符合契约：schemathesis 拿契约打后端（响应违约即失败）—— 命门
# 触发：改动契约或后端实现的 PR / push
on:
  pull_request:
    paths: ["docs/api/**", "backend/**"]
  push:
    branches: [main]
    paths: ["docs/api/**", "backend/**"]

env:
  SPEC: docs/api/openapi-core.yaml

jobs:
  contract-lint:                       # Gate0a：契约 lint（硬红线）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Spectral lint
        run: npx -y @stoplight/spectral-cli lint "$SPEC" --ruleset docs/api/.spectral.yaml --fail-severity=error

  breaking-change:                     # Gate0b：破坏性变更检测（删字段/改类型/改必填 → 标 breaking，需升版本+双 approve）
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - name: oasdiff (base vs head)
        run: |
          git show "origin/${{ github.base_ref }}:$SPEC" > /tmp/base.yaml 2>/dev/null || { echo "base 无契约，跳过"; exit 0; }
          docker run --rm -v /tmp:/tmp -v "$PWD:/repo" tufin/oasdiff breaking /tmp/base.yaml "/repo/$SPEC" --fail-on ERR

  contract-test:                       # Gate1：后端必须符合契约（命门）。需后端可达。
    runs-on: ubuntu-latest
    continue-on-error: true            # 【地基期】后端未起→放开，仅信息。每完成一里程碑模块，把该模块 path 纳入 gate1-strict 硬校验；全部实现后删本 job、gate1-strict 去过滤=整体硬红线。
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: schemathesis 打后端（断言响应符合契约）
        env: { TARGET: "${{ vars.API_BASE_URL || 'http://localhost:8080/v1' }}" }
        run: |
          pip install schemathesis
          # 注：schemathesis v4 语法（--url 取代 --base-url；--max-examples 取代 --hypothesis-max-examples；默认 checks 已含响应schema/状态码/鉴权）
          schemathesis run "$SPEC" --url "$TARGET" --max-examples 20 || {
            echo "::error::后端响应违反契约（Gate1 命门）"; exit 1; }

  gate1-strict:                        # Gate1 硬红线·按里程碑逐模块收紧：只打"已实现模块"的 path，违约即挂。
    runs-on: ubuntu-latest               # 每完成一个里程碑，往 DONE_PATHS 加该模块 path 正则；全部完成后删过滤 + 删 contract-test/continue-on-error。
    env:
      # 已转硬红线的模块 path 正则。M1=auth+me；M2/M3 主数据派单；M4 催收；M9 结算；M5 质检；M8 结案；M6 存证；M10 报表；M7 H5(public)。
      DONE_PATHS: "^/(auth|me)$|^/auth/|^/me$|^/(projects|batches|cases)(/\\{id\\})?$|^/sea$|^/batches/\\{id\\}/(dispatch|redispatch|open-rate)$|^/cases/\\{id\\}/(accept|reject|claim|assign|release|return|open-for-claim|close)$|^/cases/\\{id\\}/(follow-ups|promises|tickets|contacts|pay-links|reductions|repay-lines|recordings)$|^/cases/\\{id\\}/recordings/latest$|^/recordings(/\\{id\\}(/ai-review|/reprocess|/parse)?)?$|^/tickets(/\\{id\\}/handle)?$|^/contacts/\\{id\\}$|^/pay-links/\\{id\\}/(resend|void)$|^/repay-lines/\\{id\\}/reverse$|^/reductions/\\{id\\}/approve$|^/recon/rollup$|^/batches/\\{id\\}/repay-lines$|^/payment-requests(/\\{id\\}(/revoke|/complete|/send)?)?$|^/co-commissions$|^/co-commissions/\\{collectorId\\}/batches/\\{batchId\\}/rate$|^/co-pay-docs(/\\{id\\}(/confirm-pay)?)?$|^/me/settlement$|^/risks$|^/risks/\\{id\\}/(dispose|escalate|review)$|^/dispose-tasks$|^/cases/\\{id\\}/evidence$|^/evidence$|^/evidence/\\{id\\}/verify$|^/cases/\\{id\\}/legal-docs$|^/legal-docs/\\{id\\}/deliver$|^/reports/(operation|export)$|^/pay/\\{token\\}$"
      # 要害 check 集（保留有意义的、排除噪声的）：
      #   保留 not_a_server_error(无5xx) / response_schema_conformance(响应schema) / content_type / response_headers / ignored_auth(鉴权强制)
      #   排除 status_code_conformance+unsupported_method = 传输层(畸形头 Tomcat 400 / 未文档化方法 405)，业务契约未枚举
      #   排除 positive_data_acceptance+negative_data_rejection = 业务端点合法格式+错数据正确返 401/422，与"合法格式必2xx"假设冲突
      CHECKS: "not_a_server_error,response_schema_conformance,content_type_conformance,response_headers_conformance,ignored_auth"
      # -m positive(只生成 schema-合法数据,测后端honor契约) + 确定性 = 稳定不 flaky。
      #   action 端点的 {id} 路径参数若被负向 fuzz 塞控制字符→畸形 URL→Tomcat 连接器 400 HTML→schemathesis JSON 反序列化失败(传输层 artifact,非契约缺陷)；
      #   故硬门用 positive 模式(契约 honor)。负向健壮性由横切层统一错误处理 + not_a_server_error 覆盖；完整负向 fuzz 在非阻断 contract-test job 作信息。
      # 排 stateful 相位：契约无 OpenAPI links→schemathesis 状态链靠启发式推断,产 sequencing artifact(端点单独均合规)；Examples/Coverage/Fuzzing 已覆盖契约一致性。
      GEN_FLAGS: "-m positive --generation-deterministic --phases examples,coverage,fuzzing"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: schemathesis 硬校验已完成模块（带鉴权：M2 等受保护端点需登录取 token 才能打到 200）
        if: ${{ env.DONE_PATHS != '' }}
        env:
          TARGET: "${{ vars.API_BASE_URL || 'http://localhost:8080/v1' }}"
          TEST_USER: "${{ vars.API_TEST_USER || 'admin' }}"
          TEST_PASS: "${{ secrets.API_TEST_PASS || 'Admin@123' }}"
        run: |
          pip install schemathesis
          TOKEN=$(curl -s -X POST "$TARGET/auth/login" -H 'Content-Type: application/json' \
            -d "{\"mode\":\"password\",\"username\":\"$TEST_USER\",\"password\":\"$TEST_PASS\"}" \
            | python3 -c "import sys,json;print(json.load(sys.stdin).get('token',''))")
          [ -z "$TOKEN" ] && { echo "::error::无法登录取 token，Gate1 无法测受保护端点"; exit 1; }
          schemathesis run "$SPEC" --url "$TARGET" -H "Authorization: Bearer $TOKEN" \
            --include-path-regex "$DONE_PATHS" -c "$CHECKS" $GEN_FLAGS --max-examples 25 || {
            echo "::error::已完成模块响应违反契约（Gate1 硬红线）"; exit 1; }

  mock-smoke:                          # 辅助：Prism 起 mock，确保契约可被 mock（前端可对 mock 开发）
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Prism mock 自检
        run: |
          npx -y @stoplight/prism-cli mock "$SPEC" &
          sleep 5
          curl -sf http://127.0.0.1:4010/v1/me >/dev/null && echo "mock OK" || echo "mock 起动（接口需鉴权属正常）"
