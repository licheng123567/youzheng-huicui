name: 前端真屏 E2E（Playwright）
# 真屏回归：拉起 PG + 后端 + vite，用 Playwright 按用户故事跑浏览器真实交互。
# 与 gate1(接口契约) 互补——gate1 保后端 honor 契约，本工作流保前端真屏可用。
on:
  workflow_dispatch: {}
  pull_request:
    paths: ["frontend/**", "backend/**", "docs/api/**"]
  push:
    branches: [main]
    paths: ["frontend/**", "backend/**", "docs/api/**"]

jobs:
  playwright:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env: { POSTGRES_DB: huicui, POSTGRES_PASSWORD: test, POSTGRES_USER: postgres }
        ports: ["5455:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with: { distribution: temurin, java-version: "21", cache: maven }
      - uses: actions/setup-node@v5
        with: { node-version: "20" }

      - name: 预构建后端
        working-directory: backend/app
        run: mvn -q -DskipTests compile

      - name: 起 Spring 后端（连 CI 的 PG，跑迁移+种子）
        working-directory: backend/app
        run: |
          nohup mvn -q spring-boot:run > /tmp/app.log 2>&1 &
          for i in $(seq 1 90); do
            if [ "$(curl -s -o /dev/null -w '%{http_code}' http://localhost:9091/v1/me)" = "401" ]; then
              echo "后端就绪（$((i*5))s）"; break
            fi
            grep -qE "APPLICATION FAILED|Migration.*failed|BUILD FAILURE" /tmp/app.log && { echo "::error::后端启动失败"; tail -50 /tmp/app.log; exit 1; }
            sleep 5
          done

      - name: 装前端依赖 + Playwright 浏览器
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: 跑 Playwright 真屏 E2E（webServer 自启 vite）
        working-directory: frontend
        env: { CI: "true" }
        run: npm run e2e

      - name: 上传失败报告/截图
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report
            frontend/test-results
          retention-days: 7
