# 有证慧催 后端 · 最小可运行配置（地基期）
server:
  port: 9091                    # 本机 8080/8090 被其它 java 服务占用，用空闲端口
  servlet:
    context-path: /v1          # 对齐契约 servers 的 /v1 basePath

spring:
  jackson:
    default-property-inclusion: non_null   # 省略 null 字段：契约多数字段非 nullable，可选字段缺省即合规（统一出口）
  datasource:
    url: jdbc:postgresql://localhost:5455/huicui   # 本机已有 homebrew postgres 占 5432，容器映射到 5455
    username: postgres
    password: test
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    # V1/V2 核心迁移在 backend/db/migration（相对运行目录 backend/app 即 ../db/migration）；
    # V900 dev 种子在 classpath，仅地基/dev 演示用（生产 profile 应排除）。
    locations: filesystem:../db/migration,classpath:db/migration
    baseline-on-migrate: false

logging:
  level:
    org.flywaydb: info

# 横切层
huicui:
  jwt:
    secret: "dev-only-secret-change-in-prod-至少32字节用于HS256签名0123456789"
    ttl-seconds: 86400
  dev-password: "Admin@123"     # 仅 dev：DevSeeder 给种子账号设此口令的 BCrypt 哈希
