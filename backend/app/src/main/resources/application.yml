# 有证慧催 后端 · 最小可运行配置（地基期）
server:
  port: 9091                    # 本机 8080/8090 被其它 java 服务占用，用空闲端口
  servlet:
    context-path: /v1          # 对齐契约 servers 的 /v1 basePath

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  jackson:
    default-property-inclusion: non_null   # 省略 null 字段：契约多数字段非 nullable，可选字段缺省即合规（统一出口）
  web:
    resources:
      add-mappings: false                  # 无静态资源，404 走 /error → JsonErrorController（JSON 而非 HTML）
  mvc:
    throw-exception-if-no-handler-found: true
  datasource:
    url: jdbc:postgresql://localhost:5455/huicui   # 本机已有 homebrew postgres 占 5432，容器映射到 5455
    username: postgres
    password: test
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    baseline-on-migrate: false
    # locations 由 profile-specific yml（application-dev.yml/application-prod.yml）覆盖。

logging:
  level:
    org.flywaydb: info

# 横切层
huicui:
  jwt:
    secret: "${HUICUI_JWT_SECRET:}"    # 空默认；prod 必须通过环境变量注入，否则启动护栏抛 IllegalStateException
    ttl-seconds: 86400
