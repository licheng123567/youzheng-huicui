    MemberPage: { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/Member' } }, meta: { $ref: '#/components/schemas/PageMeta' } } }

    # ---------- 系统业务规则配置 (settings) ----------
    SettingsDomainEnum: { type: string, enum: [TIMERS, ROTATION, MARK_CODES, CLOSE_REASONS, SMS], description: '计时器/轮转/标记码/关闭原因/短信阈值' }
    Settings:
      type: object
      description: '系统业务规则配置(平台可配·带版本/生效时间·参数变更只对新计时案件生效 BR-M3-19)'
      properties:
        domain: { $ref: '#/components/schemas/SettingsDomainEnum' }
        version: { type: integer, description: '配置版本' }
        effectiveAt: { type: string, format: date-time, description: '生效时间(对新计时案件生效)' }
        timers: { type: [object, 'null'], description: 'TIMERS 域(BR-M3-19)', properties: { t1Hours: { type: integer, description: 'T1 平台公海滞留' }, tCollectorHours: { type: integer, description: '催收员无跟进释放 CFG-TC' }, t2Hours: { type: integer, description: '服务商处置时限' }, maxCycleDays: { type: integer, description: '最长周期' } } }
        rotation: { type: [object, 'null'], description: 'ROTATION 域', properties: { maxRotations: { type: integer, description: '最大轮转次数' }, holdCap: { type: integer, description: '催收员持有上限 CFG-HOLDCAP BR-M3-06' } } }
        markCodes: { type: [array, 'null'], description: 'MARK_CODES 域 CFG-MARK-CODES BR-M4-12。connected=true 表示接通；effectiveFollowUp=true 表示有效跟进，服务端据此决定是否重置 T_collector(BR-M4-03/12)。ERD注：前四常见码=接通有效，末尾未接通码=false。', items: { type: object, properties: { code: { type: string }, label: { type: string }, enabled: { type: boolean }, connected: { type: boolean, description: '是否接通(true=接通)' }, effectiveFollowUp: { type: boolean, description: '是否有效跟进；true 时服务端重置 T_collector(BR-M4-03)' } } } }
        closeReasons: { type: [array, 'null'], description: 'CLOSE_REASONS 域 CFG-CLOSE-REASONS', items: { type: object, properties: { kind: { $ref: '#/components/schemas/CloseKindEnum' }, code: { type: string }, label: { type: string } } } }
        sms: { type: [object, 'null'], description: 'SMS 域 CFG-SMS-COOLDOWN BR-M4-14a', properties: { cooldownMinutes: { type: integer, description: '同案短信冷却分钟' } } }
    SettingsInput:
      type: object
      required: [domain]
      description: '更新配置(带生效时间·写审计·只对新计时案件生效 BR-M3-19)'
      properties:
        domain: { $ref: '#/components/schemas/SettingsDomainEnum' }
        effectiveAt: { type: [string, 'null'], format: date-time, description: '空=立即生效' }
        timers: { type: [object, 'null'], properties: { t1Hours: { type: integer }, tCollectorHours: { type: integer }, t2Hours: { type: integer }, maxCycleDays: { type: integer } } }
        rotation: { type: [object, 'null'], properties: { maxRotations: { type: integer }, holdCap: { type: integer } } }
