    BillingUsagePage: { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/BillingUsage' } }, meta: { $ref: '#/components/schemas/PageMeta' } } }
    RechargeLog: { type: object, properties: { id: { type: string }, type: { $ref: '#/components/schemas/BillingTypeEnum' }, delta: { type: number, description: '+充值/-扣减' }, balance: { type: number }, ref: { type: string }, tm: { type: string, format: date-time } } }
    RechargeLogPage: { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/RechargeLog' } }, meta: { $ref: '#/components/schemas/PageMeta' } } }
    RechargeInput:
      type: object
      required: [orgId, type, qty]
      description: |
        平台后台充值能力额度（BR-M9-06a）。
        充值类型仅限预付项（RechargeTypeEnum）：STT 分钟(物业/服务商均可预充)、SMS 条数(仅物业)。
        EVIDENCE/LEGAL 按次计入对账非预充（不在此枚举，BR-M9-10）。
        org×type 矩阵：服务商仅可充 STT；物业可充 STT 或 SMS；EVIDENCE/LEGAL 物业按次计入对账、非预充。
      properties:
        orgId: { type: string }
        type: { $ref: '#/components/schemas/RechargeTypeEnum' }
        qty: { type: number }
        note: { type: string }

