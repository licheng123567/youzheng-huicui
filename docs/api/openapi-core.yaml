    EvidenceItem: { type: object, properties: { id: { type: string }, caseId: { type: string }, scene: { $ref: '#/components/schemas/EvidenceSceneEnum' }, status: { $ref: '#/components/schemas/EvidenceStatusEnum' }, certNo: { type: [string, 'null'] }, certUrl: { type: [string, 'null'] }, issuedAt: { type: [string, 'null'], format: date-time } } }
