  /cases/{id}/claim:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      operationId: claimCase
      tags: [dispatch]
      summary: 催收员抢单(本服务商公海默认/开放池跨服务商·校验上限 BR-M3-04/15)
      description: |
        支持两类池：
        1. **本服务商公海（默认）**：催收员默认抢本服务商公海案件（BR-M3-04）。
        2. **平台开放抢单池（OPEN_POOL）**：仅当平台把案件标记"开放抢单"后，催收员可跨服务商抢开放池（BR-M3-15）。
        服务端按案件当前 pool 自动判定适用规则，无需前端额外传参。
        并发安全：行级锁原子占用，同一案件不可被两人同时抢中，已被抢→409 BIZ_ALREADY_CLAIMED（BR-M3-07）。
        持有上限：超 CFG-HOLDCAP→409 BIZ_HOLD_CAP（BR-M3-06）。
        结算归属：开放池抢中归抢中者所属服务商（BR-M3-04/BR-M9-03）。
      x-permission: case.claim
      x-data-scope: own-org
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      responses: { '200': { description: ok }, '409': { $ref: '#/components/responses/Conflict' } }   # 已被抢/超上限

