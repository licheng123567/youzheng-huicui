        - { name: caseId, in: query, schema: { type: string }, description: '按案件过滤' }
        - { name: status, in: query, schema: { $ref: '#/components/schemas/SmsSendStatusEnum' } }
        - { name: from, in: query, schema: { type: string, format: date } }
        - { name: to, in: query, schema: { type: string, format: date } }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
      responses:
        '200': { description: ok, content: { application/json: { schema: { $ref: '#/components/schemas/SmsSendRecordPage' } } } }

  /audit-log:
    get:
      operationId: listAuditLog
      tags: [org-member]
      summary: 操作日志/审计(按角色数据范围 BR-M1)
      x-data-scope: range
      parameters: [ { name: from, in: query, schema: { type: string } }, { name: to, in: query, schema: { type: string } }, { $ref: '#/components/parameters/Page' }, { $ref: '#/components/parameters/Size' } ]
      responses: { '200': { description: ok, content: { application/json: { schema: { $ref: '#/components/schemas/AuditLogPage' } } } } }
  /permission-matrix:
    get:
      operationId: getPermissionMatrix
      tags: [org-member]
      summary: 权限矩阵总览(功能点×角色·可导出 BR-M1-04c)
      x-data-scope: platform
      responses: { '200': { description: ok, content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/PermissionMatrixItem' } } } } } }

components:

  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }

  parameters:
    Id: { name: id, in: path, required: true, schema: { type: string } }
    Page: { name: page, in: query, schema: { type: integer, minimum: 1, default: 1 } }
    Size: { name: size, in: query, schema: { type: integer, minimum: 1, maximum: 200, default: 20 } }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      description: '写操作幂等键(防重复提交/重试双扣)。同 key 重复请求返回首次结果。支付/结算/上传/派单等有副作用端点建议必带。'
      schema: { type: string }

  responses:
    Unauthorized: { description: 未认证/Token失效, content: { application/json: { schema: { $ref: '#/components/schemas/Error' }, example: { code: 'AUTH_401', message: '未登录或登录已过期', traceId: 't-...' } } } }
    Forbidden: { description: 无权限/越数据范围, content: { application/json: { schema: { $ref: '#/components/schemas/Error' }, example: { code: 'PERM_403', message: '无该操作权限或超出数据范围', traceId: 't-...' } } } }
    NotFound: { description: 资源不存在, content: { application/json: { schema: { $ref: '#/components/schemas/Error' } } } }
    Conflict: { description: 状态机/业务冲突(非法状态流转、容量不足、防倒挂、已锁定), content: { application/json: { schema: { $ref: '#/components/schemas/Error' }, example: { code: 'STATE_409', message: '当前状态不允许该操作', traceId: 't-...' } } } }
    ValidationError: { description: 入参/业务规则校验失败, content: { application/json: { schema: { $ref: '#/components/schemas/Error' }, example: { code: 'VALIDATION_422', message: '校验失败', details: [ { field: 'rate', rule: 'lte_payout', message: '催收员比例不得超过付佣比例(防倒挂)' } ] } } } }

  schemas:

    # ---------- 通用 ----------
    Error:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: |
            错误码字典(前端按 code 差异化提示)：
            通用 AUTH_401(未登录/Token失效) / PERM_403(无权限/越数据范围) / NOT_FOUND_404(资源不存在) / STATE_409(状态机非法流转) / VALIDATION_422(入参校验失败)；
            业务 BIZ_PAYOUT_INVERT(防倒挂：催收员比例>付佣比例) / BIZ_CAP_EXCEEDED(派单超持有余量 CFG-HOLDCAP) / BIZ_LINE_LOCKED(明细已结算/已纳入其他支付申请单) /
            BIZ_PR_PAID(支付申请单已完成PAID，不可撤销) / BIZ_WRONG_SETTLE_SIDE(错线访问结算资源：收佣线非平台/物业，或付佣线非平台/服务商) /
            BIZ_NO_VOUCHER(完成支付申请单必须上传收款/支付凭证 BR-M9-12d) /
            BIZ_CASE_CLOSED(案件已结案) / BIZ_REDUCE_OVER_SELF(超催收员自决档·转线下) /
            BIZ_NO_RECORDING(无录音文件) / BIZ_TOKEN_EXPIRED(缴费链接失效) /
            BIZ_OPEN_RATE_REQUIRED(开放抢单前未设付佣比例 BR-M9-18) / BIZ_NOT_PENDING_DISPATCH(非待派单不可作废 BR-M2-17) /
            BIZ_DUP_ACCT(同批户号重复 BR-M2-14) / BIZ_SMS_COOLDOWN(缴费短信冷却未过 BR-M4-14a) /
            BIZ_QUOTA_EXHAUSTED(短信/STT分钟余量不足；补解析时余额不足也用此码) /
            BIZ_ALREADY_CLAIMED(并发抢单已被他人抢占 BR-M3-07) / BIZ_HOLD_CAP(超持有上限 CFG-HOLDCAP BR-M3-06) /
          enum: [AUTH_401, PERM_403, NOT_FOUND_404, STATE_409, VALIDATION_422, BIZ_PAYOUT_INVERT, BIZ_CAP_EXCEEDED, BIZ_LINE_LOCKED, BIZ_PR_PAID, BIZ_WRONG_SETTLE_SIDE, BIZ_NO_VOUCHER, BIZ_CASE_CLOSED, BIZ_REDUCE_OVER_SELF, BIZ_NO_RECORDING, BIZ_TOKEN_EXPIRED, BIZ_OPEN_RATE_REQUIRED, BIZ_NOT_PENDING_DISPATCH, BIZ_DUP_ACCT, BIZ_SMS_COOLDOWN, BIZ_QUOTA_EXHAUSTED, BIZ_ALREADY_CLAIMED, BIZ_HOLD_CAP]
        message: { type: string }
        traceId: { type: string }
        details:
          type: array
          items: { type: object, properties: { field: { type: string }, rule: { type: string }, message: { type: string } } }
    PageMeta:
      type: object
      properties: { page: { type: integer }, size: { type: integer }, total: { type: integer } }
    Money: { type: integer, description: '金额·分(amount_cents)。基数口径=减免后实收·不含税 BR-M9-01b', example: 120000 }
    Rate: { type: number, minimum: 0, maximum: 1, description: '比率·分数(0-1，如 0.30=30%)。v1.0.3 统一为分数：DB/后端/前端一致，展示层 ×100 显示', example: 0.08 }

    # ---------- 枚举(单一事实源, 见 ERD 枚举字典) ----------
    OrgTypeEnum: { type: string, enum: [PLATFORM, PROPERTY, PROVIDER] }
    RoleTemplateEnum: { type: string, enum: [SA, SE, PL, PC, VL, CO] }
    CaseStatusEnum: { type: string, enum: [PENDING_DISPATCH, PROVIDER_SEA, IN_PROGRESS, PROMISED, SETTLED, WITHDRAWN, BAD_DEBT, VOIDED], description: 'VOIDED=误传纠错作废(仅 PENDING_DISPATCH 可作废 BR-M2-17)' }
    TicketStatusEnum: { type: string, enum: [PENDING, HANDLED], description: '工单状态(待处理/已处理) ERD TicketStatus' }
    PromiseStateEnum: { type: string, enum: [PENDING, FULFILLED, PARTIAL_FULFILLED, BROKEN], description: '承诺履约:待履约/已兑现/部分兑现(BR-M4-13分期)/已爽约' }
    LegalDocTypeEnum: { type: string, enum: [COLLECTION_LETTER, LAWYER_LETTER, LITIGATION], description: '催收函/律师函/起诉状 BR-M4-18' }
    LegalDocStatusEnum: { type: string, enum: [GENERATING, GENERATED, DELIVERED, SIGNED, ARCHIVED], description: '生成中/已生成PDF/已送达/已签收/已存证 BR-M4-18' }
    LegalStageEnum: { type: string, enum: [NONE, FUNCTION_LETTER, LAWYER_LETTER, LITIGATION, DELIVERED], description: '法务阶段·平行字段(D2)' }
    PoolEnum: { type: string, enum: [PLATFORM_SEA, PROVIDER_SEA, OPEN_POOL, PRIVATE], description: '平台公海/服务商公海/开放抢单池/私海(持有催收员)' }
    CloseKindEnum: { type: string, enum: [WITHDRAWN, BAD_DEBT] }
    ActivityTypeEnum: { type: string, enum: [CALL, NOTE, TICKET, SMS, EVIDENCE, PROMISE, LEGAL, STATUS, OPLOG] }
    CallRecStatusEnum: { type: string, enum: [NO_FILE, UPLOADING, PARSING, READY, FAILED, QUOTA_BLOCKED], description: 'NO_FILE=无录音需手动上传; QUOTA_BLOCKED=分钟余额不足暂停解析(充值后可补解析 BR-M5-02/BR-M4-02a)' }
    MarkCodeEnum:
      type: string
      description: '通话结果标记码，取值来自 CFG-MARK-CODES，服务端按 settings 校验。常见值：PROMISED/REFUSED/NEED_TICKET/FOLLOW_UP/NO_ANSWER'
    ReduceDecideEnum: { type: string, enum: [COLLECTOR_SELF, OFFLINE_INTERNAL, PL_APPROVE] }
    ReduceStateEnum: { type: string, enum: [EFFECTIVE, OFFLINE_TRACE] }
    DispatchModeEnum: { type: string, enum: [WHOLE, SPLIT] }
    ChannelEnum: { type: string, enum: [WECHAT_QR, BANK_TRANSFER, CASH] }
    ReconSideEnum: { type: string, enum: [IN, OUT], description: 'IN=收佣(平台生成) OUT=付佣(服务商生成)' }
    PaymentRequestStatusEnum: { type: string, enum: [PENDING, PAID, VOIDED], description: 'PENDING待付可撤/PAID完成锁定/VOIDED作废明细释放' }
    CoPayDocStatusEnum: { type: string, enum: [PENDING_PAY, SETTLED] }
    PayLinkStatusEnum: { type: string, enum: [ACTIVE, EXPIRED] }
    RiskLevelEnum: { type: string, enum: [HIGH, MID, LOW] }
    RiskReviewVerdictEnum: { type: string, enum: [CONFIRMED, FALSE_POSITIVE, ESCALATED] }
    DisposeTaskStatusEnum: { type: string, enum: [PENDING, DONE] }
    SupervisionActionEnum: { type: string, enum: [REMIND, TALK, TRAINING, NOTE], description: '督导动作：REMIND=提醒 ｜ TALK=督导谈话 ｜ TRAINING=安排培训 ｜ NOTE=记录(BR-M10-10)' }
    SmsSendStatusEnum: { type: string, enum: [SENT, FAILED, DELIVERED], description: '短信发送状态：SENT=已发送 ｜ FAILED=发送失败 ｜ DELIVERED=已送达(依通道能力 BR-M9-08)' }

    # ---------- auth ----------
    LoginByPassword: { type: object, required: [mode, username, password], properties: { mode: { type: string, description: '判别值=password' }, username: { type: string }, password: { type: string } } }
    LoginBySms: { type: object, required: [mode, phone, code], properties: { mode: { type: string, description: '判别值=sms' }, phone: { type: string }, code: { type: string } } }
    LoginTokenResult:
      type: object
      description: '单账号登录或 /auth/select-account 换取后的 token 结果'
      properties:
        token: { type: string, description: 'JWT/access token' }
    LoginResult:
      type: object
      description: '登录结果；单账号返回 token；多账号返回 loginTicket+accounts，需调 /auth/select-account 换取 token(BR-M1-11)'
      properties:
        token: { type: [string, 'null'], description: '单账号直接返回token；多账号为空，需选 account 后换取' }
        loginTicket: { type: [string, 'null'], description: '多账号临时票据，有效期短(如 5 分钟)，单账号为空' }
        accounts:
          type: [array, 'null']
          description: '一号多账号列表(BR-M1-11)，单账号为空'
          items: { type: object, properties: { accountId: { type: string }, orgName: { type: string }, role: { $ref: '#/components/schemas/RoleTemplateEnum' }, name: { type: string } } }
    Me:
      type: object
      properties:
        accountId: { type: string }
        name: { type: string }
        org: { type: object, properties: { id: { type: string }, type: { $ref: '#/components/schemas/OrgTypeEnum' }, name: { type: string } } }
        role: { $ref: '#/components/schemas/RoleTemplateEnum' }
        dataScope: { type: [object, 'null'], properties: { areas: { type: array, items: { type: string } }, properties: { type: array, items: { type: string } }, providers: { type: array, items: { type: string } } } }
        permissions: { type: array, items: { type: string }, description: '权限点集(对齐 permMatrix)' }
    SelfAccountUpdate: { type: object, properties: { oldPassword: { type: string }, newPassword: { type: string }, newPhone: { type: string }, smsCode: { type: string } } }

    # ---------- project / batch ----------
    ReduceTier:
      type: object
      required: [discount, decide]
      properties: { discount: { type: string, example: '9折' }, capCents: { oneOf: [ { $ref: '#/components/schemas/Money' }, { type: 'null' } ] }, waivePenalty: { type: boolean }, decide: { $ref: '#/components/schemas/ReduceDecideEnum' } }
    ProjectInput:
      type: object
      required: [name, area, commInRate]
      properties:
        name: { type: string }
        area: { type: string }
        province: { type: string }
        city: { type: string }
        district: { type: string }
        propCompany: { type: string }
        contractType: { type: string }
        feeRows: { type: array, items: { type: object, properties: { biz: { type: string }, std: { type: string } } } }
        feeCycle: { type: string }
        penalty: { type: string }
        payInfo: { type: string }
        commInRate: { $ref: '#/components/schemas/Rate', description: '收佣比例(平台↔物业)·必填 BR-M9-01a' }
        coordinatorIds: { type: array, items: { type: string }, description: '关联协调员(PC↔项目 多对多·决定其可见案件范围 BR-M2-13/US-M2-02)' }
        litigation: { type: [object, 'null'], properties: { creditCode: { type: string }, legal: { type: string }, addr: { type: string } } }
    Project:
      description: '物业/平台视角(含 commInRate 与财务汇总)。服务商视角用 ProjectForProvider'
      allOf:
        - { $ref: '#/components/schemas/ProjectInput' }
        - type: object
          required: [viewRole]
          properties:
            viewRole: { type: string, description: '角色判别(discriminator)=PROPERTY_PLATFORM' }
            id: { type: string }
            org: { type: string, description: '归属物业(短名·用于数据范围过滤)' }
            status: { type: string }
            dueTotalCents: { $ref: '#/components/schemas/Money' }
            repayTotalCents: { $ref: '#/components/schemas/Money' }
            coordinators: { type: array, items: { $ref: '#/components/schemas/CoordinatorRef' } }
            reduceTiers: { type: array, items: { $ref: '#/components/schemas/ReduceTier' } }
    ProjectForProvider:
      type: object
      description: '服务商视角项目档案=催收依据，**字段级不含 commInRate / 财务汇总**(资金双线 BR-M1-06/M9-11；契约测试断言 commInRate 不存在)'
      additionalProperties: false   # v1.0.1: 与 Project 互斥(否则平台 Project 也匹配本分支致 oneOf 歧义)
      required: [viewRole]
      properties:
        viewRole: { type: string, description: '角色判别(discriminator)=PROVIDER' }
        id: { type: string }
        name: { type: string }
        area: { type: string }
        propCompany: { type: string }
        contractType: { type: string }
        feeStd: { type: string }
        feeCycle: { type: string }
        penalty: { type: string }
        payInfo: { type: string }
        reduceTiers: { type: array, items: { $ref: '#/components/schemas/ReduceTier' } }
        litigation: { type: [object, 'null'], properties: { creditCode: { type: string }, legal: { type: string }, addr: { type: string } } }
        status: { type: string }
    BatchImport:
      type: object
      required: [projectId, commInRate, rows]
      properties:
        projectId: { type: string }
        commInRate: { $ref: '#/components/schemas/Rate' }
        rows: { type: array, items: { $ref: '#/components/schemas/CaseImportRow' } }
    CaseImportRow:
      type: object
      description: '案件导入行。必填=户号/姓名/手机/房号/应收/欠费周期；诉讼要素可后补(BR-M2-14)'
      required: [acctNo, ownerName, phone, room, dueCents, arrearPeriod]
      properties:
        acctNo: { type: string, description: '户号' }
        ownerName: { type: string }
        phone: { type: string }
        room: { type: string }
        dueCents: { $ref: '#/components/schemas/Money' }
        arrearPeriod: { type: string, description: '欠费周期，如 2025-01~2025-12' }
        litigation: { type: [object, 'null'], description: '诉讼要素(可后补)', properties: { idCard: { type: string }, addr: { type: string } } }
    ManualCaseInput:
      type: object
      description: '手工逐条新增案件(与 Excel 导入等价创建·入批 BR-M2-14/US-M2-03)。复用导入行字段+可选诉讼要素'
      required: [acctNo, ownerName, phone, room, dueCents, arrearagePeriods]
      properties:
        acctNo: { type: string, description: '户号(同批唯一·重复 409 BIZ_DUP_ACCT)' }
        ownerName: { type: string }
        phone: { type: string }
        room: { type: string }
        dueCents: { $ref: '#/components/schemas/Money' }
        arrearagePeriods: { type: array, items: { type: string }, description: '欠费周期(必填)' }
        litigationFields: { description: '诉讼要素(可后补)', oneOf: [ { $ref: '#/components/schemas/LitigationFields' }, { type: 'null' } ] }
    ImportResult:
      type: object
      description: '导入结果：成功/跳过计数 + 逐行错误(跳过错误行、其余继续)'
      properties:
        batch: { $ref: '#/components/schemas/BatchForProperty' }   # 物业导入→物业视角(无 payOutRate)：未派单批次本无付佣比例 + 资金双线 BR-M9-11
        total: { type: integer }
        succeeded: { type: integer }
        skipped: { type: integer }
        errors: { type: array, items: { $ref: '#/components/schemas/ImportError' } }
    ImportError:
      type: object
      properties: { row: { type: integer }, field: { type: string }, code: { type: string }, message: { type: string } }
    BatchBase:
      type: object
      properties:
        id: { type: string }
        projectId: { type: string }
        code: { type: string, description: '批次号（原 no，避 YAML1.1 布尔陷阱）' }
        providerId: { type: [string, 'null'] }
        coordinators: { type: array, items: { $ref: '#/components/schemas/CoordinatorRef' }, description: '关联协调员(PC↔批次 多对多 BR-M2-13)' }
        status: { type: string }
        reduceMode: { type: string, enum: [INHERIT, CUSTOM], description: 'INHERIT=继承项目默认；CUSTOM=批次自定义覆盖(BR-M2-18b)' }
        playbookMode: { type: string, enum: [INHERIT, CUSTOM], description: 'INHERIT=继承项目；CUSTOM=批次自定义(BR-M2-18b)' }
    Batch:
      description: '平台全视角(双线均含)。物业用 BatchForProperty、服务商用 BatchForProvider'
      unevaluatedProperties: false   # v1.0.2: 三向 oneOf 互斥(3.1 unevaluatedProperties 透视 allOf)
      allOf:
        - { $ref: '#/components/schemas/BatchBase' }
        - type: object
          required: [viewRole, commInRate, payOutRate]   # 平台双线均含→与窄变体互斥
          properties:
            viewRole: { type: string, description: '角色判别(discriminator)=PLATFORM' }
            commInRate: { $ref: '#/components/schemas/Rate', description: '生效收佣比例(批次覆盖否则继承项目 D5)' }
            commInInherited: { type: boolean }
            payOutRate: { $ref: '#/components/schemas/Rate', description: '生效付佣比例' }
    BatchForProperty:
      description: '物业视角：**含 commInRate、字段级不含 payOutRate**(资金双线 BR-M9-11)'
      unevaluatedProperties: false   # v1.0.2: 不含 payOutRate→与平台/服务商视角互斥
      allOf:
        - { $ref: '#/components/schemas/BatchBase' }
        - type: object
          required: [viewRole, commInRate]
          properties: { viewRole: { type: string, description: '角色判别(discriminator)=PROPERTY' }, commInRate: { $ref: '#/components/schemas/Rate' }, commInInherited: { type: boolean } }
    BatchForProvider:
      description: '服务商视角：**含 payOutRate、字段级不含 commInRate**(资金双线 BR-M9-11)'
      unevaluatedProperties: false   # v1.0.2: 不含 commInRate→与平台/物业视角互斥
      allOf:
        - { $ref: '#/components/schemas/BatchBase' }
        - type: object
          required: [viewRole, payOutRate]
          properties: { viewRole: { type: string, description: '角色判别(discriminator)=PROVIDER' }, payOutRate: { $ref: '#/components/schemas/Rate' } }
    BatchView: { oneOf: [ { $ref: '#/components/schemas/Batch' }, { $ref: '#/components/schemas/BatchForProperty' }, { $ref: '#/components/schemas/BatchForProvider' } ], discriminator: { propertyName: viewRole, mapping: { PLATFORM: '#/components/schemas/Batch', PROPERTY: '#/components/schemas/BatchForProperty', PROVIDER: '#/components/schemas/BatchForProvider' } }, description: '服务端按角色返回:平台=Batch/物业=BatchForProperty/服务商=BatchForProvider' }
    BatchPage: { type: object, properties: { items: { type: array, items: { $ref: '#/components/schemas/BatchView' } }, meta: { $ref: '#/components/schemas/PageMeta' } } }

    # ---------- case ----------
    Case:
      type: object
      properties:
        id: { type: string }
        acctNo: { type: string, description: '户号(必填·与 CaseImportRow 共用 ERD CASE.acct_no/BR-M2-14)' }
        batchId: { type: string }
        projectId: { type: string }
        projectName: { type: string, description: '高频展示字段，列表直接带，免前端 join' }
        ownerName: { type: string, description: 'redacted=true 时为脱敏占位 BR-M8-09' }
        room: { type: string }
        dueCents: { $ref: '#/components/schemas/Money' }
        reduceAfterCents: { $ref: '#/components/schemas/Money' }
        arrearagePeriods: { type: array, items: { type: string }, description: '欠费周期(必填·要素化诉状数据源 ERD CASE/BR-M2-15)' }
        litigationFields: { description: '诉讼要素(可后补·要素化诉状 BR-M4-18a)', oneOf: [ { $ref: '#/components/schemas/LitigationFields' }, { type: 'null' } ] }
        status: { $ref: '#/components/schemas/CaseStatusEnum' }
