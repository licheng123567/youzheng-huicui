        closeReasons: { type: [array, 'null'], items: { type: object, properties: { kind: { $ref: '#/components/schemas/CloseKindEnum' }, code: { type: string }, label: { type: string } } } }
        sms: { type: [object, 'null'], description: 'SMS 域 CFG-SMS-COOLDOWN BR-M4-14a/M9-08/09。签名/模板由平台统一配置(BR-M9-09)，物业不创建', properties: { cooldownMinutes: { type: integer, description: '同案短信冷却分钟' }, signature: { type: [string, 'null'], description: '短信签名(平台统一配置 CFG-SMS-SIGN BR-M9-09)' }, templates: { type: [array, 'null'], description: '可用短信模板列表(平台统一配置 CFG-SMS-TPL BR-M9-09)', items: { type: object, properties: { id: { type: string }, name: { type: string }, content: { type: string } } } }, warnThreshold: { type: [integer, 'null'], description: '短信条数预警阈值 CFG-SMS-WARN(BR-M9-08)' } } }
