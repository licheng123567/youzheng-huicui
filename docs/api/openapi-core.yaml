      x-permission: case.call
      x-data-scope: case-actor
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
                source: { type: string, enum: [APP_AUTO, MANUAL], default: MANUAL }
                recordedAt: { type: string, format: date-time }
                durationSec: { type: integer }
                phone: { type: string }
      responses:
        '202': { description: 受理(解析中), content: { application/json: { schema: { $ref: '#/components/schemas/CallRecording' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
