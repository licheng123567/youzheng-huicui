      type: object
      description: 'KPI 项·强类型(金额=cents/比率=number/计数=integer，避免裸 string)。kind 判别取哪个值字段'
      required: [label, kind]
      properties:
        label: { type: string }
        kind: { type: string, enum: [MONEY, RATE, COUNT] }
        amountCents: { description: 'kind=MONEY 时', oneOf: [ { $ref: '#/components/schemas/Money' }, { type: 'null' } ] }
        rate: { description: 'kind=RATE 时', oneOf: [ { $ref: '#/components/schemas/Rate' }, { type: 'null' } ] }
        count: { type: [integer, 'null'], description: 'kind=COUNT 时' }
    ReportRow:
      type: object
      description: '按维度(项目/批次/月)聚合行(字段随 dimension·PRD BR-M10-08 字段待定稿可扩)'
