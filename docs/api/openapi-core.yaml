openapi: 3.1.0
info:
  title: 有证慧催 · API 契约（全模块·已冻结）
  version: 1.3.0   # v1.3.0(additive): +个人中心 POST /me/password(自助改密·新规则)、+GET /search(案件/业主搜索 BR-M4-22 字段·数据范围裁剪) | v1.2.0: +消息中心·sea/events | v1.1.0: +workbench·派单决策
  contact: { name: 契约 Owner（架构师）, email: api-owner@youzheng.example }
  description: |
    从高保真原型 + PRD(BR/US) + 报告14口径抽取的全模块契约（单一事实源 SSOT）。**v1.0 已冻结（2026-06-24）**：经 codex×2 + 人工×2 共四轮独立审计、openapi-generator Spring 桩 mvn compile、Flyway 真库迁移三重验证，0 阻断/0 高。破坏性变更须升 major + 双 approve。
    覆盖：主数据(项目/批次/案件) → 派单/公海 → 催收作业(录音/AI复盘/跟进/减免) → 结案 → 结算(支付申请单·手动组单/撤销重生成/凭证) → 质检复核 → 业主H5。
    外围(存证M6/充值M9-B/报表M10/AI M5/组织成员M1)已纳入。

    **约定**：金额一律 amount_cents(分, integer)；比率 rate(**分数 0-1**, number, 如 0.08=8%；v1.0.3 统一,展示层 ×100)；时间 ISO8601；
    状态/类型一律枚举码(见 components.schemas 各 *Enum)。所有列表默认分页+按当前主体数据范围(scope)强制过滤。

    **扩展字段**：
    - `x-permission`: 调用该端点所需权限点(对齐 permMatrix / 02-角色操作权限矩阵)。
    - `x-data-scope`: own-org(本组织) | range(SE 数据范围:区域/物业/服务商三维 BR-M1-14) | platform(仅平台) | case-holder(仅本案持有催收员 BR-M4-01) | case-actor(案件持有催收员 OR 案件关联物业负责人/协调员(PL/PC) OR 平台代操作(SA) BR-M4-01a/M1-15；注:仅持有催收员本人动作重置 T_collector) | public(无登录) —— 服务端强制裁剪，非仅前端隐藏。
    - `x-settlement-side-rule` / `x-response-by-role`: 支付申请单线别绑定、按角色返回不同响应 schema(资金双线字段级隔离)。
servers:
  - url: https://api.youzheng.example/v1
    description: 生产(占位)
  - url: http://localhost:4010/v1
    description: Mock(Prism, 按本契约起)

security:
  - bearerAuth: []

tags:
  - { name: auth, description: 认证 }
  - { name: projects, description: 项目/小区 }
  - { name: batches, description: 批次 }
  - { name: cases, description: 案件 }
  - { name: dispatch, description: 派单/公海 }
  - { name: collection, description: 催收作业(录音/复盘/跟进/减免) }
  - { name: settlement, description: 结算对账 }
  - { name: commission, description: 催收员佣金(服务商内部) }
  - { name: qc, description: 质检/风控 }
  - { name: owner-h5, description: 业主缴费H5(无登录) }
  - { name: legal, description: 法律文书(催收函/律师函/起诉状·M4) }
  - { name: settings, description: 系统业务规则配置(M3/M4) }
  - { name: evidence, description: 存证(M6·只向物业) }
  - { name: billing, description: 计费与充值(M9-B) }
  - { name: reports, description: 经营报表(M10) }
  - { name: ai, description: AI配置/话术库/作战手册(M5) }
  - { name: org-member, description: 组织与成员/审计(M1) }
  - { name: workbench, description: 角色工作台/待办聚合(M4·BR-M4-20) }
  - { name: notification, description: 消息中心/互推闭环(M4·BR-M4-23) }

paths:

  /auth/sms-code:
    post:
      operationId: requestSmsCode
      tags: [auth]
      summary: 请求短信验证码(手机号登录第一步 BR-M1-10)
      security: []
      x-permission: none
      x-data-scope: public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [phone]
              properties:
                phone: { type: string, description: '手机号' }
      responses:
        '200': { description: 验证码已发送 }
        '422': { $ref: '#/components/responses/ValidationError' }
        '429': { description: 请求过于频繁(限流)，稍后重试 }

  /auth/select-account:
    post:
      operationId: selectAccount
      tags: [auth]
      summary: 多账号选择换取 token(BR-M1-11 一号多账号)
      security: []
      x-permission: none
      x-data-scope: public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [loginTicket, accountId]
              properties:
                loginTicket: { type: string, description: '多账号登录临时票据(LoginResult.loginTicket)' }
                accountId: { type: string, description: '选择的账号 id' }
      responses:
        '200':
          description: 换取 token 成功
          content: { application/json: { schema: { $ref: '#/components/schemas/LoginTokenResult' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: 统一登录(账号密码 / 手机验证码)——按账号自动识别角色组织，无入口分类
      security: []
      x-permission: none
      x-data-scope: public
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - { $ref: '#/components/schemas/LoginByPassword' }
                - { $ref: '#/components/schemas/LoginBySms' }
              discriminator:
                propertyName: mode
                mapping:
                  password: '#/components/schemas/LoginByPassword'
                  sms: '#/components/schemas/LoginBySms'
      responses:
        '200':
          description: 登录成功(单账号返回 token；一号多账号时返回 loginTicket+accounts 供选择 BR-M1-11)
          content: { application/json: { schema: { $ref: '#/components/schemas/LoginResult' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /me:
    get:
      operationId: getMe
      tags: [auth]
      summary: 当前主体(角色/组织/数据范围/权限点集)
      x-data-scope: own-org
      responses:
        '200':
          description: ok
          content: { application/json: { schema: { $ref: '#/components/schemas/Me' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      operationId: updateMe
      tags: [auth]
      summary: 自助设置密码 / 变更手机号(所有角色 BR-M1-09)
      x-permission: self
      x-data-scope: own-org
      requestBody:
        content: { application/json: { schema: { $ref: '#/components/schemas/SelfAccountUpdate' } } }
      responses:
        '204': { description: ok }
        '422': { $ref: '#/components/responses/ValidationError' }

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: 项目列表(按 scope 过滤)
      x-data-scope: range
      parameters:
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
        - { name: q, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
      responses:
        '200': { description: ok, content: { application/json: { schema: { $ref: '#/components/schemas/ProjectPage' } } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      operationId: createProject
      tags: [projects]
      summary: 新建项目(含收佣比例必填 BR-M9-01a)
      x-permission: proj.edit
      x-data-scope: own-org
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/ProjectInput' } } }
      responses:
        '201': { description: created, content: { application/json: { schema: { $ref: '#/components/schemas/Project' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /projects/{id}:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    get:
      operationId: getProject
      tags: [projects]
      summary: 项目档案。服务端按角色返回不同 schema：物业/平台=Project(含 commInRate)，服务商=ProjectForProvider(字段级无佣金 BR-M1-06/M9-11)
      x-data-scope: range
      x-response-by-role: 'property|platform → Project; provider → ProjectForProvider'
      responses:
        '200':
          description: ok(按角色返回 Project 或 ProjectForProvider)
          content: { application/json: { schema: { oneOf: [ { $ref: '#/components/schemas/Project' }, { $ref: '#/components/schemas/ProjectForProvider' } ], discriminator: { propertyName: viewRole, mapping: { PROPERTY_PLATFORM: '#/components/schemas/Project', PROVIDER: '#/components/schemas/ProjectForProvider' } } } } }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: updateProject
      tags: [projects]
      summary: 编辑项目档案
      x-permission: proj.edit
      x-data-scope: own-org
      requestBody: { content: { application/json: { schema: { $ref: '#/components/schemas/ProjectInput' } } } }
      responses:
        '200': { description: ok, content: { application/json: { schema: { $ref: '#/components/schemas/Project' } } } }
        '403': { $ref: '#/components/responses/Forbidden' }

  /projects/{id}/reduce-tiers:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    put:
      operationId: setProjectReduceTiers
      tags: [projects]
      summary: 维护减免阶梯(项目级·决定权 BR-M2-18a)
      x-permission: reduce.policy.edit
      x-data-scope: own-org
      requestBody:
        content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/ReduceTier' } } } }
      responses:
        '200': { description: ok }
        '403': { $ref: '#/components/responses/Forbidden' }

  /projects/{id}/coordinators:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    put:
      tags: [projects]
      operationId: setProjectCoordinators
      summary: 维护项目关联协调员(负责人挂载多个PC·可增减·决定其数据范围内可见案件 BR-M2-13/US-M2-02)
      x-permission: proj.edit
      x-data-scope: own-org
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CoordinatorsInput' } } } }
      responses:
        '200': { description: ok }
        '403': { $ref: '#/components/responses/Forbidden' }

  /batches:
    get:
      operationId: listBatches
      tags: [batches]
      summary: 批次列表(按 scope/项目过滤；案件入口"批次优先")
      x-data-scope: range
      parameters:
        - { name: projectId, in: query, schema: { type: string } }
        - { name: status, in: query, schema: { type: string } }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
      responses:
        '200': { description: ok, content: { application/json: { schema: { $ref: '#/components/schemas/BatchPage' } } } }

  /batches/{id}:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    get:
      operationId: getBatch
      tags: [batches]
      summary: 批次详情(按角色双线裁剪：平台=Batch双线/物业=BatchForProperty只收佣/服务商=BatchForProvider只付佣 D5/M9-11)
      x-data-scope: range
      x-response-by-role: 'platform → Batch; property → BatchForProperty; provider → BatchForProvider'
      responses:
        '200': { description: ok, content: { application/json: { schema: { $ref: '#/components/schemas/BatchView' } } } }
        '404': { $ref: '#/components/responses/NotFound' }

  /batches/import:
    post:
      operationId: importBatch
      tags: [batches]
      summary: 导入批次(必填字段+诉讼要素可后补；本批收佣比例 BR-M9-01a)
      x-permission: batch.import
      x-data-scope: own-org
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/BatchImport' } } } }
      responses:
        '200': { description: 导入完成(成功/跳过计数+逐行错误), content: { application/json: { schema: { $ref: '#/components/schemas/ImportResult' } } } }
        '422': { $ref: '#/components/responses/ValidationError' }

  /batches/{id}/cases:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      tags: [cases]
      operationId: createCase
      summary: 手工逐条新增案件入批(Excel 导入的等价创建入口·同批户号唯一 BR-M2-14/US-M2-03)
      x-permission: batch.import
      x-data-scope: own-org
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ManualCaseInput' } } } }
      responses:
        '201': { description: created, content: { application/json: { schema: { $ref: '#/components/schemas/Case' } } } }
        '409': { $ref: '#/components/responses/Conflict' }   # 同批户号重复 BIZ_DUP_ACCT
        '422': { $ref: '#/components/responses/ValidationError' }

  /batches/{id}/void:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      tags: [batches]
      operationId: voidBatch
      summary: 作废批次(误传纠错·仅含待派单案件可作废·填原因留痕 BR-M2-17/US-M2-07)
      description: '物业负责人/PC▲/平台代操作；批次内案件须均为 PENDING_DISPATCH 否则 409 BIZ_NOT_PENDING_DISPATCH。写 AuditLog(代操作含 proxyFor)。'
      x-permission: case.void
      x-data-scope: own-org
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/ReasonInput' } } } }
      responses:
        '200': { description: ok }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }   # 含非待派单案件 BIZ_NOT_PENDING_DISPATCH

  /batches/{id}/coordinators:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    put:
      tags: [batches]
      operationId: setBatchCoordinators
      summary: 维护批次关联协调员(PC↔批次 多对多·变更写审计 BR-M2-13)
      x-permission: batch.import
      x-data-scope: own-org
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/CoordinatorsInput' } } } }
      responses:
        '200': { description: ok }
        '403': { $ref: '#/components/responses/Forbidden' }

  /batches/{id}/reduce-tiers:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    get:
      operationId: getBatchReduceTiers
      tags: [batches]
      summary: 批次级减免阶梯查询(含 source 表达继承项目或批次自定义 BR-M2-18a/18b)
      description: |
        返回批次有效减免阶梯配置。source=INHERITED 表示继承项目默认；source=CUSTOM 表示批次级自定义覆盖。
        项目级更新后已自定义的批次保留自定义并标记 source=CUSTOM（BR-M2-18b）。
      x-data-scope: range
      x-permission: reduce.policy.edit
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  source: { type: string, enum: [INHERITED, CUSTOM], description: 'INHERITED=继承项目默认；CUSTOM=批次自定义覆盖(BR-M2-18b)' }
                  tiers: { type: array, items: { $ref: '#/components/schemas/ReduceTier' } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    put:
      operationId: putBatchReduceTiers
      tags: [batches]
      summary: 批次级自定义减免阶梯(PUT=全量覆盖·批次自定义 CUSTOM；传空数组=清除自定义恢复继承 BR-M2-18a/18b)
      description: |
        PUT 语义为全量覆盖。传入阶梯即标记为 CUSTOM（批次级自定义）；传空数组=删除批次自定义、重新继承项目默认。
        执行优先级：批次自定义 > 项目级（BR-M2-18b）。
        权限：reduce.policy.edit（物业负责人/平台代操作）；x-data-scope range/own-org。
      x-permission: reduce.policy.edit
      x-data-scope: own-org
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tiers]
              properties:
                tiers: { type: array, items: { $ref: '#/components/schemas/ReduceTier' }, description: '批次自定义阶梯。空数组=清除自定义恢复继承项目' }
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  source: { type: string, enum: [INHERITED, CUSTOM] }
                  tiers: { type: array, items: { $ref: '#/components/schemas/ReduceTier' } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /batches/{id}/playbook:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    get:
      operationId: getBatchPlaybook
      tags: [ai]
      summary: 批次级作战手册查询(含 source 表达继承项目或批次自定义·对称项目级 BR-M2-18b)
      description: |
        返回批次有效作战手册。source=INHERITED 表示继承项目；source=CUSTOM 表示批次级自定义覆盖。
        执行优先级：批次自定义 > 项目级（BR-M2-18b）。
      x-data-scope: range
      responses:
        '200':
          description: ok
          content:
            application/json:
              schema:
                type: object
                properties:
                  source: { type: string, enum: [INHERITED, CUSTOM], description: 'INHERITED=继承项目；CUSTOM=批次自定义(BR-M2-18b)' }
                  playbook: { $ref: '#/components/schemas/Playbook' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      operationId: adoptBatchPlaybook
      tags: [ai]
      summary: 采纳或清除批次级作战手册自定义(传 content=设为 CUSTOM；传 null=清除自定义恢复继承 BR-M2-18b)
      description: |
        物业负责人或协调员·分级采纳闸(BR-M5-05a/b)。
        传 content 字段：设为批次自定义（CUSTOM）；content=null：清除批次自定义、重新继承项目版本。
      x-permission: playbook.adopt
      x-data-scope: own-org
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                version: { type: string }
                content: { type: [string, 'null'], description: '作战手册内容；null=清除自定义恢复继承' }
      responses:
        '200': { description: ok }
        '403': { $ref: '#/components/responses/Forbidden' }

  /batches/{id}/dispatch:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    post:
      operationId: dispatchBatch
      tags: [dispatch]
      summary: 撮合派单(整批/拆单·容量护栏 BR-M3-23·付佣比例)
      x-permission: case.dispatch
      x-data-scope: platform
      parameters: [ { $ref: '#/components/parameters/IdempotencyKey' } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: '#/components/schemas/DispatchInput' } } } }
      responses:
        '200': { description: ok }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409': { $ref: '#/components/responses/Conflict' }   # 余量不足/状态不允许
        '422': { $ref: '#/components/responses/ValidationError' }

  /batches/{id}/open-rate:
    parameters: [ { $ref: '#/components/parameters/Id' } ]
    put:
      tags: [dispatch]
      operationId: setBatchOpenRate
      summary: 平台为批次设置开放抢单付佣比例(开放抢单前置·未设不可开放 BR-M9-18)
      x-permission: case.dispatch
      x-data-scope: platform
      requestBody: { required: true, content: { application/json: { schema: { type: object, required: [openRate], properties: { openRate: { $ref: '#/components/schemas/Rate' } } } } } }
      responses:
        '200': { description: ok }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationError' }

  /sea:
    get:
      operationId: listSea
      tags: [dispatch]
      summary: 公海列表(平台全局公海 / 服务商待接单·公海，按 scope)
      x-data-scope: range
      parameters:
        - { name: pool, in: query, required: true, schema: { type: string, enum: [platform, provider, open] } }
        - { $ref: '#/components/parameters/Page' }
        - { $ref: '#/components/parameters/Size' }
      responses:
        '200': { description: ok, content: { application/json: { schema: { $ref: '#/components/schemas/SeaCasePage' } } } }

  /cases:
    get:
      operationId: listCases
      tags: [cases]
